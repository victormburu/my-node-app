<!DOCTYPE html>
<html>

<head>
    <title>Tick Engine Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        select {
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            background: #111;
            color: white;
            border: 1px solid #333;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }
        
        .signal {
            font-size: 28px;
            font-weight: bold;
        }
        
        .over {
            color: #22c55e;
        }
        
        .under {
            color: #ef4444;
        }
        
        .no_trade {
            color: #facc15;
        }
        
        .bar {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }
        
        .label {
            width: 20px;
        }
        
        .track {
            flex: 1;
            height: 12px;
            background: #334155;
            border-radius: 5px;
            margin-left: 10px;
            overflow: hidden;
        }
        
        .fill {
            height: 100%;
            background: #38bdf8;
            width: 0%;
        }
    </style>
</head>

<body>

    <h1>📊 Tick Engine Dashboard</h1>

    <!-- MARKET SELECTOR -->
    <div class="controls">
        <select id="marketSelect">
            <option value="R_10">Volatility 10</option>
            <option value="R_25">Volatility 25</option>
            <option value="R_50">Volatility 50</option>
            <option value="R_75">Volatility 75</option>
            <option value="R_100" selected>Volatility 100</option>
        </select>
    </div>

    <button onclick="setLive()">Live Mode</button>
    <button onclick="loadReplay()">Replay Mode</button>

    <div class="card">
        <h2>Entry Strength</h2>
        <div id="entryScore" class="signal"></div>
        <div id="entryBar" style="height:10px;background:#334155;border-radius:5px;">
            <div id="entryFill" style="height:100%;width:0%;background:#22c55e;"></div>
        </div>
        <div id="entryQuality"></div>
    </div>

    <div class="card">
        <h2>Entry Timing</h2>

        <div id="delayText">--</div>
        <div id="peakScore">--</div>
    </div>

    <div id="heatmap"></div>
    <div id="filter-status"></div>
    <div id="performance"></div>

    <div class="grid">

        <div class="card">
            <h2>Signal</h2>
            <div id="signal" class="signal no_trade">
                Loading...
            </div>
        </div>

        <div class="card">
            <h2>Bias</h2>
            <pre id="bias"></pre>
        </div>

        <div class="card">
            <h2>Prediction</h2>
            <pre id="prediction"></pre>
        </div>

        <div class="card">
            <h2>Digit Frequencies</h2>
            <pre id="freq"></pre>
        </div>

    </div>

    <br>

    <div class="card">
        <h2>Digit Heatmap (0–9 Probability)</h2>
        <div id="heatmap"></div>
    </div>

    <script>
    let ws;
    let currentMarket = "R_100";
    let delayCountdown = 0;

    // =========================
    // CONNECT WEBSOCKET
    // =========================
    function connectWebSocket() {

        if (ws) {
            ws.close();
        }

        ws = new WebSocket(
            `wss://deriv-analysis.onrender.com/stream/${currentMarket}`
        );

        ws.onopen = () => {
            console.log("WS Connected");
        };

        ws.onmessage = (event) => {

            const payload = JSON.parse(event.data);

            console.log(payload);

            // backend sends:
            // {
            //   symbol,
            //   analytics,
            //   signal
            // }

            renderDashboard(payload.analytics);
        };

        ws.onclose = () => {

            console.log("WS Reconnecting...");

            setTimeout(() => {
                connectWebSocket();
            }, 2000);
        };

        ws.onerror = (err) => {
            console.log("WS Error", err);
        };
    }

    // =========================
    // MARKET SWITCH
    // =========================
    document.getElementById("marketSelect")
        .addEventListener("change", (e) => {

            currentMarket = e.target.value;

            connectWebSocket();
        });

    // =========================
    // MAIN DASHBOARD RENDER
    // =========================
    function renderDashboard(data) {

        if (!data) return;

        console.log("Dashboard Data:", data);

        // =========================
        // SIGNAL
        // =========================
        const signalEl =
            document.getElementById("signal");

        if (data.signal && data.signal.signal) {

            signalEl.innerText =
                `DIGIT ${data.signal.digit}`;

            signalEl.className =
                "signal over";

        } else {

            signalEl.innerText =
                "NO TRADE";

            signalEl.className =
                "signal no_trade";
        }

        // =========================
        // BIAS
        // =========================
        document.getElementById("bias").innerText =
            JSON.stringify({
                volatility: data.volatility
            }, null, 2);

        // =========================
        // PREDICTION
        // =========================
        document.getElementById("prediction").innerText =
            JSON.stringify(data.pattern, null, 2);

        // =========================
        // FREQUENCY
        // =========================
        document.getElementById("freq").innerText =
            JSON.stringify(data.probability, null, 2);

        // =========================
        // ENTRY SCORE
        // =========================
        if (data.entry) {

            document.getElementById("entryScore")
                .innerText =
                data.entry.score;

            document.getElementById("entryFill")
                .style.width =
                data.entry.score + "%";

            document.getElementById("entryQuality")
                .innerText =
                data.entry.quality;
        }

        // =========================
        // TIMING
        // =========================
        if (data.timing) {

            delayCountdown =
                data.timing.delay_seconds;

            document.getElementById("delayText")
                .innerText =
                data.timing.ready
                ? "ENTRY READY"
                : `WAIT ${delayCountdown}s`;

            document.getElementById("peakScore")
                .innerText =
                `Peak Strength: ${data.timing.confidence_peak}`;
        }

        // =========================
        // HEATMAP
        // =========================
        const heatmap =
            document.getElementById("heatmap");

        heatmap.innerHTML = "";

        const probs =
            data.probability || {};

        for (let digit in probs) {

            const percent =
                (probs[digit] * 100).toFixed(1);

            const row =
                document.createElement("div");

            row.className = "bar";

            let color = "#ef4444";

            if (percent > 70) {
                color = "#22c55e";
            } else if (percent > 40) {
                color = "#facc15";
            }

            row.innerHTML = `
                <div class="label">${digit}</div>

                <div class="track">
                    <div class="fill"
                        style="
                            width:${percent}%;
                            background:${color};
                        ">
                    </div>
                </div>

                <div style="margin-left:10px">
                    ${percent}%
                </div>
            `;

            heatmap.appendChild(row);
        }
    }

    // =========================
    // LIVE DELAY COUNTDOWN
    // =========================
    setInterval(() => {

        if (delayCountdown > 0) {

            delayCountdown--;

            document.getElementById("delayText")
                .innerText =
                `WAIT ${delayCountdown}s`;

        }
    }, 1000);

    // =========================
    // START
    // =========================
    connectWebSocket();
</script>

</body>

</html>
